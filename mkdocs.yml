site_name: mcp-aws-solution-architect
site_url: https://fernandofatech.github.io/mcp-aws-solution-architect/
site_description: An MCP server that turns any MCP-aware client into a copilot for AWS Solution Architects.
site_author: Fernando Francisco Azevedo
repo_url: https://github.com/fernandofatech/mcp-aws-solution-architect
repo_name: fernandofatech/mcp-aws-solution-architect
edit_uri: edit/develop/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mermaid2

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fernandofatech
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/fernando-francisco-azevedo/
    - icon: fontawesome/solid/globe
      link: https://fernando.moretes.com

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Tools:
      - suggest_services: tools/suggest-services.md
      - generate_architecture_diagram: tools/generate-architecture-diagram.md
      - estimate_cost: tools/estimate-cost.md
      - review_well_architected: tools/review-well-architected.md
      - generate_adr: tools/generate-adr.md
  - Architecture: architecture.md
  - ADRs:
      - "0001 — Record architecture decisions": adr/0001-record-architecture-decisions.md
      - "0002 — Use the MCP Python SDK": adr/0002-use-mcp-python-sdk.md
      - "0003 — Bedrock is optional": adr/0003-bedrock-is-optional.md
  - Roadmap: roadmap.md
